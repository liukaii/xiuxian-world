<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xiuxian World</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
        }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        .header { text-align: center; padding: 30px 0; }
        .header h1 {
            font-size: 2.5em;
            background: linear-gradient(45deg, #ffd700, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        .card {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }
        .card-title {
            font-size: 1.3em;
            margin-bottom: 15px;
            color: #ffd700;
            border-bottom: 2px solid rgba(255,215,0,0.3);
            padding-bottom: 10px;
        }
        .btn {
            display: inline-block;
            padding: 15px 30px;
            margin: 10px;
            border: none;
            border-radius: 25px;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.3s;
            width: 80%;
            max-width: 300px;
        }
        .btn-primary { background: linear-gradient(45deg, #667eea, #764ba2); color: white; }
        .btn-success { background: linear-gradient(45deg, #11998e, #38ef7d); color: white; }
        .btn-warning { background: linear-gradient(45deg, #f093fb, #f5576c); color: white; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        .stat-item {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }
        .stat-label { font-size: 0.9em; color: #aaa; margin-bottom: 5px; }
        .stat-value { font-size: 1.5em; font-weight: bold; color: #ffd700; }
        .progress-bar {
            width: 100%;
            height: 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            overflow: hidden;
            margin: 10px 0;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.3s;
        }
        .log {
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            padding: 15px;
            max-height: 300px;
            overflow-y: auto;
            font-size: 0.9em;
        }
        .hidden { display: none !important; }
        input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 1em;
        }
        .menu-grid { display: flex; flex-direction: column; align-items: center; }
        @media (max-width: 600px) {
            .stats-grid { grid-template-columns: 1fr; }
            .header h1 { font-size: 2em; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Xiuxian World</h1>
            <p>A Cultivation Journey</p>
        </div>

        <div id="main-menu" class="card">
            <div class="card-title">Select Mode</div>
            <div class="menu-grid">
                <button class="btn btn-primary" onclick="showPlayerLogin()">Player Mode</button>
                <button class="btn btn-warning" onclick="showGodLogin()">God Mode</button>
            </div>
        </div>

        <div id="player-login" class="card hidden">
            <div class="card-title">Player Login</div>
            <input type="text" id="player-name" placeholder="Enter name (empty for new)">
            <div style="text-align: center; margin-top: 20px;">
                <button class="btn btn-success" onclick="playerLogin()">Enter Game</button>
                <button class="btn" onclick="backToMain()">Back</button>
            </div>
        </div>

        <div id="god-login" class="card hidden">
            <div class="card-title">God Mode</div>
            <input type="password" id="god-password" placeholder="Enter password">
            <div style="text-align: center; margin-top: 20px;">
                <button class="btn btn-warning" onclick="godLogin()">Enter</button>
                <button class="btn" onclick="backToMain()">Back</button>
            </div>
        </div>

        <div id="player-game" class="hidden">
            <div class="card">
                <div class="card-title">Character Info</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-label">Name</div>
                        <div class="stat-value" id="p-name">-</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">Realm</div>
                        <div class="stat-value" id="p-realm">-</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">Age</div>
                        <div class="stat-value" id="p-age">-</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">Lifespan</div>
                        <div class="stat-value" id="p-lifespan">-</div>
                    </div>
                </div>
                
                <div style="margin: 15px 0;">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
                        <span>Progress</span>
                        <span id="p-progress-text">0%</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="p-progress-bar" style="width: 0%"></div>
                    </div>
                </div>

                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-label">Power</div>
                        <div class="stat-value" id="p-power">-</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">Stones</div>
                        <div class="stat-value" id="p-stones">-</div>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-title">Actions</div>
                <div class="menu-grid">
                    <button class="btn btn-primary" onclick="cultivate(1)">Cultivate 1 Day</button>
                    <button class="btn btn-primary" onclick="cultivate(10)">Cultivate 10 Days</button>
                    <button class="btn btn-success" onclick="explore()">Explore</button>
                    <button class="btn" onclick="showInventory()">Inventory</button>
                </div>
            </div>

            <div class="card">
                <div class="card-title">Log</div>
                <div class="log" id="player-log">
                    <div>Welcome to Xiuxian World...</div>
                </div>
            </div>

            <div style="text-align: center; margin-top: 20px;">
                <button class="btn" onclick="saveAndExit()">Save & Exit</button>
            </div>
        </div>

        <div id="god-view" class="hidden">
            <div class="card">
                <div class="card-title">World Overview</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-label">Players</div>
                        <div class="stat-value" id="w-players">-</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">Total</div>
                        <div class="stat-value" id="w-total">-</div>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-title">All Players</div>
                <div id="god-player-list"></div>
            </div>

            <div style="text-align: center; margin-top: 20px;">
                <button class="btn" onclick="backToMain()">Exit</button>
            </div>
        </div>
    </div>

    <script>
        const REALMS = [
            {name: "Qi Refining", lifespan: 100, power: 1},
            {name: "Foundation", lifespan: 200, power: 10},
            {name: "Golden Core", lifespan: 500, power: 100},
            {name: "Nascent Soul", lifespan: 1000, power: 1000},
            {name: "Soul Transformation", lifespan: 2000, power: 10000},
            {name: "Void Refining", lifespan: 5000, power: 100000},
            {name: "Body Integration", lifespan: 10000, power: 1000000},
            {name: "Great Ascension", lifespan: 20000, power: 10000000},
            {name: "Tribulation", lifespan: 50000, power: 100000000},
            {name: "True Immortal", lifespan: -1, power: 1000000000}
        ];

        const SURNAMES = ["Li", "Wang", "Zhang", "Liu", "Chen", "Yang", "Zhao", "Huang", "Zhou", "Wu"];
        const NAMES = ["Yun", "Feng", "Lei", "Tian", "Di", "Xuan", "Huang", "Yu", "Zhou", "Shan", "He", "Hai", "Chuan", "Qing", "Hong", "Zi", "Bai", "Jin", "Mu", "Shui", "Huo", "Tu", "Chang", "Sheng", "Yong", "Heng", "Xiao", "Yao"];
        const ELEMENTS = ["Metal", "Wood", "Water", "Fire", "Earth"];

        let currentPlayer = null;
        const GOD_PASSWORD = "tiandao123";

        function loadData() {
            const data = localStorage.getItem('xiuxian_world_v2');
            return data ? JSON.parse(data) : { players: {} };
        }

        function saveData(data) {
            localStorage.setItem('xiuxian_world_v2', JSON.stringify(data));
        }

        function randomChoice(arr) {
            return arr[Math.floor(Math.random() * arr.length)];
        }

        function generateName() {
            return randomChoice(SURNAMES) + randomChoice(NAMES);
        }

        function generateSpiritRoot() {
            const rand = Math.random();
            let quality, elements;
            if (rand < 0.005) { quality = "Chaos"; elements = [...ELEMENTS]; }
            else if (rand < 0.02) { quality = "Mutated"; elements = [randomChoice(ELEMENTS), randomChoice(ELEMENTS)]; }
            else if (rand < 0.1) { quality = "Heaven"; elements = [randomChoice(ELEMENTS)]; }
            else if (rand < 0.4) { quality = "True"; elements = [randomChoice(ELEMENTS), randomChoice(ELEMENTS)]; }
            else { quality = "Fake"; elements = [randomChoice(ELEMENTS), randomChoice(ELEMENTS), randomChoice(ELEMENTS), randomChoice(ELEMENTS)]; }
            return { quality, elements };
        }

        function showScreen(id) {
            ['main-menu', 'player-login', 'god-login', 'player-game', 'god-view'].forEach(s => {
                document.getElementById(s).classList.add('hidden');
            });
            document.getElementById(id).classList.remove('hidden');
        }

        function showPlayerLogin() { showScreen('player-login'); }
        function showGodLogin() { showScreen('god-login'); }
        function backToMain() { showScreen('main-menu'); }

        function playerLogin() {
            const name = document.getElementById('player-name').value.trim();
            const data = loadData();

            if (name && data.players[name]) {
                currentPlayer = data.players[name];
                addLog('Welcome back, ' + currentPlayer.name + '!');
            } else {
                const spiritRoot = generateSpiritRoot();
                currentPlayer = {
                    name: name || generateName(),
                    age: 15 + Math.floor(Math.random() * 15),
                    realmLevel: 0,
                    realmProgress: 0,
                    hp: 100, maxHp: 100, mp: 50, maxMp: 50,
                    comprehension: Math.floor(Math.random() * 10) + 1,
                    luck: Math.floor(Math.random() * 10) + 1,
                    perception: Math.floor(Math.random() * 10) + 1,
                    karma: 0, destiny: Math.floor(Math.random() * 10) + 1,
                    spiritStones: Math.floor(Math.random() * 100),
                    items: [], skills: [],
                    spiritRoot: spiritRoot,
                    isAlive: true
                };
                data.players[currentPlayer.name] = currentPlayer;
                saveData(data);
                addLog('New character: ' + currentPlayer.name);
                addLog('Spirit Root: ' + spiritRoot.quality + ' (' + spiritRoot.elements.join(', ') + ')');
            }

            updatePlayerUI();
            showScreen('player-game');
        }

        function updatePlayerUI() {
            if (!currentPlayer) return;
            document.getElementById('p-name').textContent = currentPlayer.name;
            document.getElementById('p-realm').textContent = REALMS[currentPlayer.realmLevel].name;
            document.getElementById('p-age').textContent = currentPlayer.age.toFixed(1) + ' years';
            const remaining = REALMS[currentPlayer.realmLevel].lifespan - currentPlayer.age;
            document.getElementById('p-lifespan').textContent = remaining.toFixed(0) + ' years';
            document.getElementById('p-progress-text').textContent = currentPlayer.realmProgress.toFixed(1) + '%';
            document.getElementById('p-progress-bar').style.width = Math.min(currentPlayer.realmProgress, 100) + '%';
            const power = REALMS[currentPlayer.realmLevel].power + Math.floor(currentPlayer.realmProgress / 100 * REALMS[currentPlayer.realmLevel].power);
            document.getElementById('p-power').textContent = power;
            document.getElementById('p-stones').textContent = currentPlayer.spiritStones;
        }

        function addLog(msg) {
            const log = document.getElementById('player-log');
            const entry = document.createElement('div');
            entry.textContent = msg;
            log.insertBefore(entry, log.firstChild);
        }

        function cultivate(days) {
            if (!currentPlayer || !currentPlayer.isAlive) return;

            for (let i = 0; i < days; i++) {
                const speed = currentPlayer.spiritRoot.quality === "Chaos" ? 3 : 
                             currentPlayer.spiritRoot.quality === "Mutated" ? 2.5 :
                             currentPlayer.spiritRoot.quality === "Heaven" ? 2 :
                             currentPlayer.spiritRoot.quality === "True" ? 1 : 0.5;
                const gain = Math.floor(10 * speed * (1 + currentPlayer.comprehension / 10));
                currentPlayer.realmProgress += gain;

                if (currentPlayer.realmProgress >= 100) {
                    tryBreakthrough();
                }

                currentPlayer.age += 1/365;

                if (currentPlayer.age >= REALMS[currentPlayer.realmLevel].lifespan) {
                    currentPlayer.isAlive = false;
                    addLog('[Lifespan Ended] ' + currentPlayer.name + ' died...');
                    break;
                }
            }

            addLog('Cultivated ' + days + ' days');
            updatePlayerUI();
            savePlayer();
        }

        function tryBreakthrough() {
            const rate = 0.5 + currentPlayer.comprehension / 20 + currentPlayer.destiny / 20 - Math.abs(currentPlayer.karma) / 100;
            if (Math.random() < Math.max(0.1, Math.min(0.95, rate))) {
                currentPlayer.realmLevel++;
                currentPlayer.realmProgress = 0;
                currentPlayer.maxHp += 50; currentPlayer.maxMp += 30;
                currentPlayer.hp = currentPlayer.maxHp; currentPlayer.mp = currentPlayer.maxMp;
                addLog('[Breakthrough] Entered ' + REALMS[currentPlayer.realmLevel].name + '!');
                if ([2, 5, 8].includes(currentPlayer.realmLevel)) {
                    addLog('[Heaven Sign] Destiny +1');
                    currentPlayer.destiny++;
                }
            } else {
                currentPlayer.realmProgress = Math.max(0, currentPlayer.realmProgress - 20);
                addLog('[Breakthrough Failed]');
            }
        }

        function explore() {
            if (!currentPlayer || !currentPlayer.isAlive) return;
            const rand = Math.random();
            if (rand < 0.1) {
                const treasures = [{name: "Ganoderma", grade: "Common"}, {name: "Zhu Guo", grade: "Rare"}];
                const t = randomChoice(treasures);
                currentPlayer.items.push(t);
                addLog('[Treasure] Got ' + t.name + ' (' + t.grade + ')');
            } else if (rand < 0.3) {
                addLog('[Met Cultivator] Progress +5');
                currentPlayer.realmProgress += 5;
            } else if (rand < 0.35) {
                addLog('[Met Master] Comprehension +1, Progress +20');
                currentPlayer.comprehension++;
                currentPlayer.realmProgress += 20;
            } else {
                addLog('[Peaceful] Walking in mountains');
                currentPlayer.karma++;
            }
            updatePlayerUI();
            savePlayer();
        }

        function showInventory() {
            if (!currentPlayer) return;
            let msg = 'Stones: ' + currentPlayer.spiritStones + '\n\nItems:\n';
            msg += currentPlayer.items.length > 0 ? currentPlayer.items.map(i => '- ' + i.name + ' (' + i.grade + ')').join('\n') : '(Empty)';
            msg += '\n\nSkills:\n' + (currentPlayer.skills.length > 0 ? currentPlayer.skills.join('\n') : '(None)');
            alert(msg);
        }

        function savePlayer() {
            const data = loadData();
            data.players[currentPlayer.name] = currentPlayer;
            saveData(data);
        }

        function saveAndExit() {
            savePlayer();
            addLog('Game saved!');
            currentPlayer = null;
            backToMain();
        }

        function godLogin() {
            if (document.getElementById('god-password').value === GOD_PASSWORD) {
                updateGodView();
                showScreen('god-view');
            } else {
                alert('Wrong password!');
            }
        }

        function updateGodView() {
            const data = loadData();
            const players = Object.values(data.players);
            document.getElementById('w-players').textContent = players.length;
            document.getElementById('w-total').textContent = players.length;
            
            const list = document.getElementById('god-player-list');
            list.innerHTML = '';
            
            players.forEach(p => {
                const div = document.createElement('div');
                div.style.cssText = 'background: rgba(255,255,255,0.05); padding: 15px; margin-bottom: 10px; border-radius: 10px;';
                const power = REALMS[p.realmLevel].power + Math.floor(p.realmProgress / 100 * REALMS[p.realmLevel].power);
                const remaining = REALMS[p.realmLevel].lifespan - p.age;
                div.innerHTML = '<h4 style="color: #ffd700;">' + p.name + ' ' + (p.isAlive ? '' : '💀') + '</h4>' +
                    '<p style="color: #aaa; font-size: 0.85em;">Age: ' + p.age.toFixed(1) + ' | Lifespan: ' + remaining.toFixed(0) + ' | Power: ' + power + '</p>' +
                    '<p style="color: #aaa; font-size: 0.85em;">Spirit Root: ' + p.spiritRoot.quality + ' | Stones: ' + p.spiritStones + '</p>' +
                    '<span style="display: inline-block; background: linear-gradient(45deg, #ffd700, #ff6b6b); padding: 5px 15px; border-radius: 15px; font-size: 0.85em; margin-top: 10px;">' + REALMS[p.realmLevel].name + '</span>';
                list.appendChild(div);
            });
        }
    </script>
</body>
</html>
