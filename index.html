<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>修仙世界 - Xiuxian World</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .header {
            text-align: center;
            padding: 30px 0;
        }
        
        .header h1 {
            font-size: 2.5em;
            background: linear-gradient(45deg, #ffd700, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        
        .header p {
            color: #aaa;
            font-size: 1.1em;
        }
        
        .card {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .card-title {
            font-size: 1.3em;
            margin-bottom: 15px;
            color: #ffd700;
            border-bottom: 2px solid rgba(255,215,0,0.3);
            padding-bottom: 10px;
        }
        
        .btn {
            display: inline-block;
            padding: 15px 30px;
            margin: 10px;
            border: none;
            border-radius: 25px;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            width: 80%;
            max-width: 300px;
        }
        
        .btn-primary {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
        }
        
        .btn-success {
            background: linear-gradient(45deg, #11998e, #38ef7d);
            color: white;
        }
        
        .btn-warning {
            background: linear-gradient(45deg, #f093fb, #f5576c);
            color: white;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .stat-item {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }
        
        .stat-label {
            font-size: 0.9em;
            color: #aaa;
            margin-bottom: 5px;
        }
        
        .stat-value {
            font-size: 1.5em;
            font-weight: bold;
            color: #ffd700;
        }
        
        .progress-bar {
            width: 100%;
            height: 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            overflow: hidden;
            margin: 10px 0;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.3s;
        }
        
        .log {
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            padding: 15px;
            max-height: 300px;
            overflow-y: auto;
            font-size: 0.9em;
            line-height: 1.6;
        }
        
        .log-entry {
            padding: 5px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .hidden {
            display: none !important;
        }
        
        .player-list {
            max-height: 400px;
            overflow-y: auto;
        }
        
        .player-item {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 10px;
        }
        
        .player-item h4 {
            color: #ffd700;
            margin-bottom: 5px;
        }
        
        .player-item p {
            font-size: 0.85em;
            color: #aaa;
        }
        
        .realm-badge {
            display: inline-block;
            background: linear-gradient(45deg, #ffd700, #ff6b6b);
            padding: 5px 15px;
            border-radius: 15px;
            font-size: 0.85em;
            font-weight: bold;
            margin-top: 10px;
        }
        
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 1em;
        }
        
        input::placeholder {
            color: #888;
        }
        
        .menu-grid {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        @media (max-width: 600px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
            
            .header h1 {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 标题 -->
        <div class="header">
            <h1>⚔️ 修仙世界</h1>
            <p>Xiuxian World - A Cultivation Journey</p>
        </div>

        <!-- 主菜单 -->
        <div id="main-menu" class="card">
            <div class="card-title">选择身份进入</div>
            <div class="menu-grid">
                <button class="btn btn-primary" onclick="showPlayerLogin()">🎮 玩家模式</button>
                <button class="btn btn-warning" onclick="showGodLogin()">👁️ 天道模式</button>
            </div>
        </div>

        <!-- 玩家登录 -->
        <div id="player-login" class="card hidden">
            <div class="card-title">玩家登录</div>
            <input type="text" id="player-name" placeholder="输入角色名（留空创建新角色）">
            <div style="text-align: center; margin-top: 20px;">
                <button class="btn btn-success" onclick="playerLogin()">进入游戏</button>
                <button class="btn" onclick="backToMain()">返回</button>
            </div>
        </div>

        <!-- 天道登录 -->
        <div id="god-login" class="card hidden">
            <div class="card-title">天道模式验证</div>
            <input type="password" id="god-password" placeholder="输入天道密码">
            <div style="text-align: center; margin-top: 20px;">
                <button class="btn btn-warning" onclick="godLogin()">进入天道</button>
                <button class="btn" onclick="backToMain()">返回</button>
            </div>
        </div>

        <!-- 玩家游戏 -->
        <div id="player-game" class="hidden">
            <div class="card">
                <div class="card-title">角色信息</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-label">姓名</div>
                        <div class="stat-value" id="p-name">-</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">境界</div>
                        <div class="stat-value" id="p-realm">-</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">年龄</div>
                        <div class="stat-value" id="p-age">-</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">寿元</div>
                        <div class="stat-value" id="p-lifespan">-</div>
                    </div>
                </div>
                
                <div style="margin: 15px 0;">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
                        <span>修为进度</span>
                        <span id="p-progress-text">0%</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="p-progress-bar" style="width: 0%"></div>
                    </div>
                </div>

                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-label">战力</div>
                        <div class="stat-value" id="p-power">-</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">灵石</div>
                        <div class="stat-value" id="p-stones">-</div>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-title">行动</div>
                <div class="menu-grid">
                    <button class="btn btn-primary" onclick="cultivate(1)">修炼1天</button>
                    <button class="btn btn-primary" onclick="cultivate(10)">修炼10天</button>
                    <button class="btn btn-success" onclick="explore()">探索世界</button>
                    <button class="btn" onclick="showInventory()">查看物品</button>
                </div>
            </div>

            <div class="card">
                <div class="card-title">修炼日志</div>
                <div class="log" id="player-log">
                    <div class="log-entry">欢迎来到修仙世界...</div>
                </div>
            </div>

            <div style="text-align: center; margin-top: 20px;">
                <button class="btn" onclick="saveAndExit()">💾 保存并退出</button>
            </div>
        </div>

        <!-- 天道界面 -->
        <div id="god-view" class="hidden">
            <div class="card">
                <div class="card-title">世界概况</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-label">玩家数量</div>
                        <div class="stat-value" id="w-players">-</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">总修士</div>
                        <div class="stat-value" id="w-total">-</div>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-title">所有玩家</div>
                <div class="player-list" id="god-player-list">
                </div>
            </div>

            <div style="text-align: center; margin-top: 20px;">
                <button class="btn" onclick="backToMain()">退出天道</button>
            </div>
        </div>
    </div>

    <script>
        // 游戏数据
        const REALMS = [
            {name: "炼气期", lifespan: 100, power: 1},
            {name: "筑基期", lifespan: 200, power: 10},
            {name: "金丹期", lifespan: 500, power: 100},
            {name: "元婴期", lifespan: 1000, power: 1000},
            {name: "化神期", lifespan: 2000, power: 10000},
            {name: "炼虚期", lifespan: 5000, power: 100000},
            {name: "合体期", lifespan: 10000, power: 1000000},
            {name: "大乘期", lifespan: 20000, power: 10000000},
            {name: "渡劫期", lifespan: 50000, power: 100000000},
            {name: "真仙", lifespan: -1, power: 1000000000}
        ];

        const SURNAMES = ["李", "王", "张", "刘", "陈", "杨", "赵", "黄", "周", "吴"];
        const NAMES = ["云", "风", "雷", "天", "地", "玄", "黄", "宇", "宙", "山", "河", "海", "川", "青", "红", "紫", "白", "金", "木", "水", "火", "土", "长", "生", "永", "恒", "逍", "遥"];
        const ELEMENTS = ["金", "木", "水", "火", "土"];

        let currentPlayer = null;
        const GOD_PASSWORD = "tiandao123";

        // 数据管理
        function loadData() {
            const data = localStorage.getItem('xiuxian_world_v2');
            return data ? JSON.parse(data) : { players: {} };
        }

        function saveData(data) {
            localStorage.setItem('xiuxian_world_v2', JSON.stringify(data));
        }

        // 工具函数
        function randomChoice(arr) {
            return arr[Math.floor(Math.random() * arr.length)];
        }

        function generateName() {
            return randomChoice(SURNAMES) + randomChoice(NAMES);
        }

        function generateSpiritRoot() {
            const rand = Math.random();
            let quality, elements;
            if (rand < 0.005) { quality = "混沌灵根"; elements = [...ELEMENTS]; }
            else if (rand < 0.02) { quality = "变异灵根"; elements = [randomChoice(ELEMENTS), randomChoice(ELEMENTS)]; }
            else if (rand < 0.1) { quality = "天灵根"; elements = [randomChoice(ELEMENTS)]; }
            else if (rand < 0.4) { quality = "真灵根"; elements = [randomChoice(ELEMENTS), randomChoice(ELEMENTS)]; }
            else { quality = "伪灵根"; elements = [randomChoice(ELEMENTS), randomChoice(ELEMENTS), randomChoice(ELEMENTS), randomChoice(ELEMENTS)]; }
            return { quality, elements };
        }

        // 界面切换
        function showScreen(id) {
            ['main-menu', 'player-login', 'god-login', 'player-game', 'god-view'].forEach(s => {
                document.getElementById(s).classList.add('hidden');
            });
            document.getElementById(id).classList.remove('hidden');
        }

        function showPlayerLogin() { showScreen('player-login'); }
        function showGodLogin() { showScreen('god-login'); }
        function backToMain() { showScreen('main-menu'); }

        // 玩家登录
        function playerLogin() {
            const name = document.getElementById('player-name').value.trim();
            const data = loadData();

            if (name && data.players[name]) {
                currentPlayer = data.players[name];
                addLog(`欢迎回来，${currentPlayer.name}！`);
            } else {
                const spiritRoot = generateSpiritRoot();
                currentPlayer = {
                    name: name || generateName(),
                    age: 15 + Math.floor(Math.random() * 15),
                    realmLevel: 0,
                    realmProgress: 0,
                    hp: 100, maxHp: 100, mp: 50, maxMp: 50,
                    comprehension: Math.floor(Math.random() * 10) + 1,
                    luck: Math.floor(Math.random() * 10) + 1,
                    perception: Math.floor(Math.random() * 10) + 1,
                    karma: 0, destiny: Math.floor(Math.random() * 10) + 1,
                    spiritStones: Math.floor(Math.random() * 100),
                    items: [], skills: [],
                    spiritRoot: spiritRoot,
                    isAlive: true
                };
                data.players[currentPlayer.name] = currentPlayer;
                saveData(data);
                addLog(`创建新角色：${currentPlayer.name}`);
                addLog(`灵根：${spiritRoot.quality}（${spiritRoot.elements.join('、')}）`);
            }

            updatePlayerUI();
            showScreen('player-game');
        }

        function updatePlayerUI() {
            if (!currentPlayer) return;
            document.getElementById('p-name').textContent = currentPlayer.name;
            document.getElementById('p-realm').textContent = REALMS[currentPlayer.realmLevel].name;
            document.getElementById('p-age').textContent = currentPlayer.age.toFixed(1) + '岁';
            const remaining = REALMS[currentPlayer.realmLevel].lifespan - currentPlayer.age;
            document.getElementById('p-lifespan').textContent = remaining.toFixed(0) + '年';
            document.getElementById('p-progress-text').textContent = currentPlayer.realmProgress.toFixed(1) + '%';
            document.getElementById('p-progress-bar').style.width = Math.min(currentPlayer.realmProgress, 100) + '%';
            const power = REALMS[currentPlayer.realmLevel].power + Math.floor(currentPlayer.realmProgress / 100 * REALMS[currentPlayer.realmLevel].power);
            document.getElementById('p-power').textContent = power;
            document.getElementById('p-stones').textContent = currentPlayer.spiritStones;
        }

        function addLog(msg) {
            const log = document.getElementById('player-log');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.textContent = msg;
            log.insertBefore(entry, log.firstChild);
        }

        // 修炼
        function cultivate(days) {
            if (!currentPlayer || !currentPlayer.isAlive) return;

            for (let i = 0; i < days; i++) {
                const speed = currentPlayer.spiritRoot.quality === "混沌灵根" ? 3 : 
                             currentPlayer.spiritRoot.quality === "变异灵根" ? 2.5 :
                             currentPlayer.spiritRoot.quality === "天灵根" ? 2 :
                             currentPlayer.spiritRoot.quality === "真灵根" ? 1 : 0.5;
                const gain = Math.floor(10 * speed * (1 + currentPlayer.comprehension / 10));
                currentPlayer.realmProgress += gain;

                if (currentPlayer.realmProgress >= 100) {
                    tryBreakthrough();
                }

                currentPlayer.age += 1/365;

                if (currentPlayer.age >= REALMS[currentPlayer.realmLevel].lifespan) {
                    currentPlayer.isAlive = false;
                    addLog(`[寿元耗尽] ${currentPlayer.name}道消身死...`);
                    break;
                }
            }

            addLog(`修炼${days}天`);
            updatePlayerUI();
            savePlayer();
        }

        function tryBreakthrough() {
            const rate = 0.5 + currentPlayer.comprehension / 20 + currentPlayer.destiny / 20 - Math.abs(currentPlayer.karma) / 100;
            if (Math.random() < Math.max(0.1, Math.min(0.95, rate))) {
                currentPlayer.realmLevel++;
                currentPlayer.realmProgress = 0;
                currentPlayer.maxHp += 50; currentPlayer.maxMp += 30;
                currentPlayer.hp = currentPlayer.maxHp; currentPlayer.mp = currentPlayer.maxMp;
                addLog(`[突破成功] 踏入${REALMS[currentPlayer.realmLevel].name}！`);
                if ([2, 5, 8].includes(currentPlayer.realmLevel)) {
                    addLog('[天降异象] 命格+1');
                    currentPlayer.destiny++;
                }
            } else {
                currentPlayer.realmProgress = Math.max(0, currentPlayer.realmProgress - 20);
                addLog('[突破失败]');
            }
        }

        // 探索
        function explore() {
            if (!currentPlayer || !currentPlayer.isAlive) return;
            const rand = Math.random();
            if (rand < 0.1) {
                const treasures = [{name: "百年灵芝", grade: "凡品"}, {name: "朱果", grade: "地品"}];
                const t = randomChoice(treasures);
                currentPlayer.items.push(t);
                addLog(`[发现宝物] ${t.name}（${t.grade}）`);
            } else if (rand < 0.3) {
                addLog('[遇到修士] 交流心得，修为+5');
                currentPlayer.realmProgress += 5;
            } else if (rand < 0.35) {
                addLog('[遇到前辈] 悟性+1，修为+20');
                currentPlayer.comprehension++;
                currentPlayer.realmProgress += 20;
            } else {
                addLog('[平安无事] 在山林间漫步');
                currentPlayer.karma++;
            }
            updatePlayerUI();
            savePlayer();
        }

        function showInventory() {
            if (!currentPlayer) return;
            let msg = `灵石：${currentPlayer.spiritStones}\n\n物品：\n`;
            msg += currentPlayer.items.length > 0 ? currentPlayer.items.map(i => `- ${i.name}（${i.grade}）`).join('\n') : "（空）";
            msg += "\n\n功法：\n" + (currentPlayer.skills.length > 0 ? currentPlayer.skills.join('\n') : "（未学习）");
            alert(msg);
        }

        function savePlayer() {
            const data = loadData();
            data.players[currentPlayer.name] = currentPlayer;
            saveData(data);
        }

        function saveAndExit() {
            savePlayer();
            addLog('游戏已保存！');
            currentPlayer = null;
            backToMain();
        }

        // 天道模式
        function godLogin() {
            if (document.getElementById('god-password').value === GOD_PASSWORD) {
                updateGodView();
                showScreen('god-view');
            } else {
                alert('密码错误！');
            }
        }

        function updateGodView() {
            const data = loadData();
            const players = Object.values(data.players);
            document.getElementById('w-players').textContent = players.length;
            document.getElementById('w-total').textContent = players.length;
            
            const list = document.getElementById('god-player-list');
            list.innerHTML = '';
            
            players.forEach(p => {
                const div = document.createElement('div');
                div.className = 'player-item';
                const power = REALMS[p.realmLevel].power + Math.floor(p.realmProgress / 100 * REALMS[p.realmLevel].power);
                const remaining = REALMS[p.realmLevel].lifespan - p.age;
                div.innerHTML = `
                    <h4>${p.name} ${p.isAlive ? '' : '💀'}</h4>
                    <p>年龄：${p.age.toFixed(1)}岁 | 寿元：${remaining.toFixed(0)}年 | 战力：${power}</p>
                    <p>灵根：${p.spiritRoot.quality} | 灵石：${p.spiritStones} | 物品：${p.items.length}件</p>
                    <span class="realm-badge">${REALMS[p.realmLevel].name}</span>
                `;
                list.appendChild(div);
            });
        }
    </script>
</body>
</html>
